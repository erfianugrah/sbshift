# ── Debezium Server: MySQL binlog source → JDBC sink → Postgres (NO Kafka) ──
# This is the exact topology the DebeziumEngine (HETEROGENEOUS.md §3) will lifecycle-manage.
# Source: quay.io/debezium/example-mysql (inventory DB, binlog ROW already on, user debezium/dbz).

# ── source: MySQL connector ──
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
debezium.source.topic.prefix=dbz
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=debezium
debezium.source.database.password=dbz
debezium.source.database.server.id=184054
debezium.source.database.include.list=inventory
debezium.source.table.include.list=inventory.customers

# standalone offset + schema-history storage (file-based — no Kafka). The "may behave
# differently" delivery-guarantee caveat (finding #2) lives here: pgshift cannot trust this
# for exactly-once, so reconcile + the cutover gate compensate.
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=0
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema_history.dat

# ── sink: JDBC straight into Postgres ──
debezium.sink.type=jdbc
debezium.sink.jdbc.connection.url=jdbc:postgresql://postgres:5432/target
debezium.sink.jdbc.connection.username=postgres
debezium.sink.jdbc.connection.password=postgres
debezium.sink.jdbc.insert.mode=upsert
debezium.sink.jdbc.primary.key.mode=record_key
debezium.sink.jdbc.delete.enabled=true
# basic = auto CREATE/ALTER on the target (spike only). In production pgshift pre-creates the
# target from the `guided` schema-translation draft and sets this to `none` (finding #4).
debezium.sink.jdbc.schema.evolution=basic
# topic→table naming. SPIKE FINDING: the documented `collection.name.format=${source.table}`
# CANNOT be used in Debezium Server config — Quarkus/SmallRye pre-expands `${...}` as its own
# config-expression syntax, finds no `source.table` property, yields null, and NPEs in
# configToProperties. Route the topic to a bare table name with a RegexRouter SMT instead
# (`$1` has no braces, so it survives). dbz.inventory.customers -> customers.
debezium.transforms=route
debezium.transforms.route.type=org.apache.kafka.connect.transforms.RegexRouter
debezium.transforms.route.regex=dbz\.inventory\.(.*)
debezium.transforms.route.replacement=$1

# ── Quarkus HTTP (health at /q/health) ──
quarkus.http.port=8080
