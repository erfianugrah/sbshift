# Throwaway spike (HETEROGENEOUS.md §5 step 0): prove MySQL binlog → Debezium Server JDBC sink
# → Postgres with NO Kafka. This is the data-plane topology the DebeziumEngine will manage.
# Run: docker compose up --build -d ; then ./verify.sh
name: sbshift-dbz-spike

services:
  mysql:
    # canonical Debezium tutorial source: inventory DB pre-seeded, binlog ROW + FULL already on,
    # CDC user debezium/dbz already granted — i.e. a source that passes the §7 source-prep KB.
    image: quay.io/debezium/example-mysql:3.0
    environment:
      MYSQL_ROOT_PASSWORD: debezium
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdebezium"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: target
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d target"]
      interval: 5s
      timeout: 5s
      retries: 20

  debezium:
    build: .
    depends_on:
      mysql: { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes:
      # Debezium Server 3.x reads Quarkus external config from ./config/application.properties
      # (CWD /debezium). Mount ONLY the file — the config/ dir also holds lib/ + metrics.yml on
      # the classpath, so shadowing the whole dir breaks startup. (Spike finding.)
      - ./conf/application.properties:/debezium/config/application.properties:ro
    ports:
      - "8080:8080"
