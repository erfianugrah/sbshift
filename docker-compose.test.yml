# Throwaway Postgres pair + bun runner for the live integration tier.
#
# One command:   bun run test:integration
# (equivalently: bun start rehearse integration)
#
# WHY A RUNNER SERVICE INSTEAD OF TWO BARE `docker run`s:
#   replicate.ts uses ONE connection string (TEST_SOURCE_DB_URL) for both the
#   host's own libpq connection AND as the subscription's CONNECTION, which the
#   TARGET's walreceiver dials. If that string were `localhost:5432`, the target
#   container would resolve `localhost` to *itself*, not the source — replication
#   would never connect. Running everything inside one compose network lets the
#   subscription use the service-DNS name `source:5432`, which resolves
#   identically from the runner and from the target. No host.docker.internal,
#   no port-publishing fragility, works the same on Linux / macOS / WSL.

name: sbshift-itest

services:
  source:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_PASSWORD: pw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 1s
      timeout: 3s
      retries: 30

  # L-16: match the rehearsal compose settings so the integration tier exercises
  # the same worker capacity limits as the real prod-scale environment.
  target:
    image: postgres:16
    command:
      - postgres
      - -c
      - max_logical_replication_workers=4
      - -c
      - max_worker_processes=8
    environment:
      POSTGRES_PASSWORD: pw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 1s
      timeout: 3s
      retries: 30

  runner:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      # Service-DNS names — resolve identically from the runner and from the
      # target's walreceiver (see header note). sslmode=disable on the source
      # because the subscription defaults to sslmode=require (for Supabase) and
      # a plain Postgres container speaks no TLS.
      TEST_SOURCE_DB_URL: postgresql://postgres:pw@source:5432/postgres?sslmode=disable
      TEST_TARGET_DB_URL: postgresql://postgres:pw@target:5432/postgres
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
    command:
      - sh
      - -c
      - bun install --frozen-lockfile && bun test test/integration.test.ts
